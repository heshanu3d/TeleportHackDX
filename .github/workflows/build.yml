name: build

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (CMake, Win32/x86)
        run: cmake -S . -B build -A Win32

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      - name: Upload DLL + desktop exe + starter data
        uses: actions/upload-artifact@v4
        with:
          name: TeleportHackDX-win32
          path: |
            build/bin/Release/TeleportHackDX.dll
            build/bin/Release/TeleportHackDesktop.exe
            favlist.fav
            hotkey.txt
          if-no-files-found: error
